# Enforced Planning Configuration
# Copy this to your project root as meta-process.yaml
#
# This is the minimal functional config surface: keys below have script effect
# today or are consumed directly by generated CI/templates.
#
# For broader planned/advisory vocabulary that is not part of the minimum live
# config contract, see templates/meta-process.future.yaml.example.

meta_process:
  version: "1.0"

  # =============================================================================
  # CORE PATTERNS (Usually always enabled)
  # =============================================================================

  plans:
    enabled: true
    # Require tests defined in plan's "Required Tests" section
    require_tests: true
    # Max lines for [Trivial] commits (no plan required)
    plans_dir: "docs/plans"

  claims:
    enabled: true
    # Require claim before creating worktree
    require_for_worktree: true

  worktrees:
    enabled: true
    # Block edits in main directory (force worktree usage)
    protect_main: true

  commits:
    # Require [Plan #N] or [Trivial] prefix
    require_prefix: true
    # Valid prefixes (regex patterns)
    valid_prefixes:
      - "\\[Plan #\\d+\\]"
      - "\\[Trivial\\]"
      - "\\[Unplanned\\]"  # Emergency escape hatch
  # =============================================================================
  # QUALITY GATES (Configurable strictness)
  # =============================================================================

  quality:
    doc_coupling:
      enabled: true
      # Mapping file location
      config_file: "scripts/relationships.yaml"

    dead_code:
      enabled: false          # opt-in per repo
      strict: false           # false = warn only, true = block commit
      min_confidence: 80      # vulture confidence threshold (60-100)
      paths: []               # specific paths to check (empty = project root)
      whitelist: ".vulture_whitelist.py"

  # =============================================================================
  # CI CONFIGURATION
  # =============================================================================

  ci:
    # Skip CI with .github/ci-disabled file
    allow_disable_file: true
    # Jobs to include
    jobs:
      test: true
      mypy: true
      fast_checks: true
      plan_checks: true
      post_merge_sync: true
    # Change detection (skip jobs for docs-only changes)
    change_detection: true

# Additional project-specific settings normally live in separate files:
#
# scripts/relationships.yaml:
#   - sources: ["src/core/*.py"]
#     docs: ["docs/architecture/core.md"]
#
