# OpenClaw Mission: Wargame — Continue from Phase 2
# Round 3. Phase 1 complete. llm_client installed.

mission_id: wargame-round3
project_root: ~/projects/wargame

objective: |
  You are building a geopolitical wargame at ~/projects/wargame.

  The plan is docs/plans/01_implementation.md. Work through ALL remaining phases.

  CURRENT STATE:
  - Phase 1 COMPLETE: models.py, engine.py, scenario_loader.py, observation
    filter, 17 tests, CLI smoke test. All working.
  - llm_client is installed in the venv (pip install -e ~/projects/llm_client done).
  - scenarios/us_iran.yaml exists with full 2-nation setup.

  START FROM Phase 2 (Game Master LLM):
  - Build src/gm/ module with GM prompt + AdjudicationPacket schema
  - Use llm_client structured output (json_schema response_format, Pydantic)
  - GM prompt goes in prompts/game_master.yaml (YAML/Jinja2 template)
  - Required kwargs on every llm_client call: task=, trace_id=, max_budget=
  - Test with round-trip: player action → GM → Core adjudication → observation

  Then Phase 3 (Sub-agents), Phase 4 (Game loop), Phase 5 (Scoring).

  IMPORTANT RULES:
  - Do NOT delete existing tests. Add new test files only.
  - Set project to "~/projects/wargame" and model to "codex" in every task
  - Run pytest before committing. Commit with [Plan #1] prefix.
  - Do NOT generate meta-tasks (docs, policies, refactoring)
  - If blocked after 3 attempts, log blocker and move to next criterion

planner:
  enabled: true
  model: gemini/gemini-2.5-flash
  max_tasks_per_cycle: 4

policy:
  max_consecutive_failures: 5
  max_cycles: 0
  max_replans: 50
  max_idle_cycles: 3
  max_cost_usd: 50.0
  poll_interval_s: 30

success_criteria:
  - type: command
    command: ["python", "-m", "pytest", "tests/", "-q", "--tb=no"]
    description: All tests pass
  # Phase 2
  - type: file_exists
    path: prompts/game_master.yaml
    description: GM prompt template exists
  - type: file_exists
    path: src/gm/__init__.py
    description: GM module exists
  # Phase 3
  - type: file_exists
    path: src/agents/__init__.py
    description: Sub-agent module exists
  # Phase 4
  - type: file_exists
    path: src/game_loop.py
    description: Game loop exists
