# OpenClaw Mission: Wargame — Continue from Phase 1 CLI smoke test
# Round 2. Prior run completed 5/6 Phase 1 criteria.

mission_id: wargame-round2
project_root: ~/projects/wargame

objective: |
  You are building a geopolitical wargame at ~/projects/wargame.

  The plan is docs/plans/01_implementation.md. Work through ALL FIVE PHASES.

  CURRENT STATE (from prior autonomous run):
  - Phase 1 is 5/6 done. models.py, engine.py, scenario_loader.py all built.
    Observation filtering is in engine.py. 14 tests pass.
  - REMAINING Phase 1: CLI smoke test only. Build src/core/__main__.py that
    loads scenarios/us_iran.yaml, processes one hardcoded AdjudicationPacket,
    prints filtered observations for each player.
  - After CLI smoke test passes, Phase 1 is complete. Move to Phase 2.

  Phase 2: Game Master LLM. Wire llm_client for structured output. Build
  GM prompt + AdjudicationPacket schema. Install llm_client first:
  pip install -e ~/projects/llm_client

  Phase 3: Sub-agent bureaucracy (Intel Chief, Diplomatic Envoy, Military Advisor).
  Phase 4: Game loop (CLI, turn history, multi-player, replay).
  Phase 5: Scoring + balance.

  IMPORTANT: Do NOT delete existing tests. Add new test files, don't modify
  existing ones unless fixing a bug IN that test. The prior run was stopped
  because the agent kept deleting tests.

  RULES:
  - Set project to "~/projects/wargame" and model to "codex" in every task
  - Each task must cite which acceptance criterion it advances
  - Run pytest before committing. Commit with [Plan #1] prefix.
  - Do NOT generate meta-tasks (docs, policies, refactoring)
  - If blocked after 3 attempts, log blocker and move to next criterion

planner:
  enabled: true
  model: gemini/gemini-2.5-flash
  max_tasks_per_cycle: 4

policy:
  max_consecutive_failures: 5
  max_cycles: 0
  max_replans: 50
  max_idle_cycles: 3
  max_cost_usd: 50.0
  poll_interval_s: 30

success_criteria:
  # Phase 1 (remaining)
  - type: file_exists
    path: scenarios/us_iran.yaml
    description: US-Iran scenario exists
  - type: command
    command: ["python", "-m", "pytest", "tests/", "-q", "--tb=no"]
    description: All tests pass
  # Phase 2
  - type: file_exists
    path: prompts/game_master.yaml
    description: GM prompt template exists
  - type: file_exists
    path: src/gm/__init__.py
    description: GM module exists
  # Phase 3
  - type: file_exists
    path: src/agents/__init__.py
    description: Sub-agent module exists
  # Phase 4
  - type: file_exists
    path: src/game_loop.py
    description: Game loop exists
